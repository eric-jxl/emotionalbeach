global:
  scrape_interval: 10s      # 每 10s 拉取一次指标
  evaluation_interval: 10s  # 每 10s 评估一次告警规则
  external_labels:
    app: emotionalbeach
    env: local

# ── 告警规则文件 ──────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/rules/*.yml

# ── 抓取配置 ──────────────────────────────────────────────────────────────────
scrape_configs:

  # 应用本身（Docker 内网 emotionalBeach:8080）
  - job_name: emotionalbeach
    static_configs:
      - targets: [ 'server:8080' ]
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  # Prometheus 自监控
  - job_name: prometheus
    static_configs:
      - targets: [ 'localhost:9090' ]

